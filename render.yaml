# Render.com deployment configuration
# Docs: https://render.com/docs/render-yaml-reference
#
# Deploy steps:
#   1. Push this repo to GitHub
#   2. Go to render.com → New → Web Service → connect your repo
#   3. Render auto-detects render.yaml and configures everything
#   4. Add your custom domain under Settings → Custom Domains → add CNAME

services:
  - type: web
    name: milliontwigs
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free          # free tier — sleeps after 15 min inactivity
    healthCheckPath: /_stcore/health
    envVars:
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
